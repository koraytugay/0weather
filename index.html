<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>0weather</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main id="app">
    <section class="card now-card">
      <div class="now-grid">
        <div class="now-left">
          <div id="now-emoji" class="now-emoji"></div>
          <div id="now-desc" class="now-desc">--</div>
        </div>
        <div class="now-center">
          <div id="now-temp" class="now-temp">--</div>
          <div id="now-feels" class="now-feels">Feels --</div>
        </div>
        <div class="now-right">
          <div id="now-range" class="now-range">--</div>
          <div id="now-wind" class="now-wind">--</div>
        </div>
      </div>
    </section>

    <section id="notes-card" class="card notes-card" style="display:none">
      <div id="notes"></div>
    </section>

    <section class="card">
      <div class="section-label">Today</div>
      <div id="today-scroll" class="hour-scroll"></div>
    </section>

    <section class="card">
      <div class="section-label">Tomorrow &mdash; <span id="tmr-summary"></span></div>
      <div id="tmr-scroll" class="hour-scroll"></div>
    </section>

    <footer class="footer">Toronto</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
