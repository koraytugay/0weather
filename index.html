<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>0weather</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main id="app">
    <section class="card now-hero">
      <div class="now-row top">
        <div id="now-temp" class="hero-temp">--</div>
        <div class="hero-meta-col">
          <div id="now-emoji" class="hero-emoji"></div>
          <div id="now-desc" class="hero-desc">--</div>
        </div>
        <div class="stat-group">
          <div class="stat-lab">Feels</div>
          <div id="now-feels" class="stat-val">--</div>
        </div>
      </div>

      <div class="now-row bottom">
        <div class="stat-group">
          <div class="stat-lab">Range</div>
          <div id="now-range" class="stat-val">--</div>
        </div>
        <div class="stat-group">
          <div class="stat-lab">Wind</div>
          <div id="now-wind" class="stat-val">--</div>
        </div>
        <div class="stat-group">
          <div class="stat-lab">UV</div>
          <div id="now-uv" class="stat-val">--</div>
        </div>
      </div>
    </section>

    <section id="notes-card" class="card notes-card" style="display:none">
      <div id="notes"></div>
    </section>

    <section class="card">
      <div class="section-label">Today</div>
      <div id="today-scroll" class="hour-scroll"></div>
    </section>

    <section id="future-days">
    </section>

    <footer class="footer">Toronto</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
